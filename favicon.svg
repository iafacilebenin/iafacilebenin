<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1A1408"/>
  
  <!-- Antenna stem -->
  <line x1="16" y1="4" x2="16" y2="9" stroke="#FF9E1B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="16" cy="3.2" r="1.5" fill="#FF9E1B"/>
  
  <!-- Head -->
  <rect x="7" y="9" width="18" height="14" rx="4" fill="none" stroke="#FF9E1B" stroke-width="1.8"/>
  
  <!-- Ear left -->
  <rect x="4.5" y="12.5" width="2.5" height="4" rx="1" fill="#FF9E1B"/>
  <!-- Ear right -->
  <rect x="25" y="12.5" width="2.5" height="4" rx="1" fill="#FF9E1B"/>
  
  <!-- Eye open (left) -->
  <circle cx="12.5" cy="15" r="1.5" fill="#FF9E1B"/>
  
  <!-- Eye wink (right) — curved line -->
  <path d="M18 14.2 Q19.5 13.2 21 14.2" stroke="#FF9E1B" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  
  <!-- Smile -->
  <path d="M12.5 19 Q16 21.5 19.5 19" stroke="#FF9E1B" stroke-width="1.4" stroke-linecap="round" fill="none"/>
</svg>
